# ============================================================
# EBD.ia — Docker Compose
# Stage atual: Fase 0.5 + Fase 1 inicial
#   - postgres + redis (Fase 0.5)
#   - mcp-oracle (Fase 1)
# ============================================================

services:

  # ----------------------------------------------------------
  # PostgreSQL 16 — sessões, auditoria, logs de tool_use
  # ----------------------------------------------------------
  postgres:
    image: postgres:16.6-alpine
    container_name: ebdia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      LANG: pt_BR.UTF-8
      LC_ALL: pt_BR.UTF-8
      PGTZ: America/Sao_Paulo
      TZ: America/Sao_Paulo
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - /data/postgres:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - ebdia_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ----------------------------------------------------------
  # Redis 7 — fila, cache, idempotência, cache PCLIB
  # ----------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: ebdia_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
    environment:
      TZ: America/Sao_Paulo
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - /data/redis:/data
    networks:
      - ebdia_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ----------------------------------------------------------
  # MCP Oracle — leitura read-only do Winthor (Camada 4)
  # Conecta no ODA via SCAN, executa queries via SQL Guard
  # ----------------------------------------------------------
  mcp-oracle:
    build:
      context: ./mcps/oracle
      dockerfile: Dockerfile
    image: ebdia/mcp-oracle:0.1.0
    container_name: ebdia_mcp_oracle
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Oracle (lido do .env)
      ORACLE_USER: ${ORACLE_USER}
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      ORACLE_DSN: ${ORACLE_DSN}
      ORACLE_POOL_MIN: ${ORACLE_POOL_MIN:-2}
      ORACLE_POOL_MAX: ${ORACLE_POOL_MAX:-10}
      ORACLE_QUERY_TIMEOUT_MS: ${ORACLE_QUERY_TIMEOUT_MS:-30000}
      ORACLE_DEFAULT_ROW_LIMIT: ${ORACLE_DEFAULT_ROW_LIMIT:-10000}
      # Postgres (para uso futuro: audit log)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Redis (para uso futuro: cache PCLIB)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Runtime
      TZ: America/Sao_Paulo
      MCP_ORACLE_TOKEN: ${MCP_ORACLE_TOKEN}
      MCP_ORACLE_LOG_DIR: /app/logs/mcp-oracle
    volumes:
      - ./logs/mcp-oracle:/app/logs/mcp-oracle
    ports:
      - "127.0.0.1:8989:8989"
    networks:
      - ebdia_net
    healthcheck:
      # /health agora executa SELECT 1 FROM DUAL (call_timeout 5s) e retorna 503 se Oracle nao responde.
      # urlopen levanta excecao em 503 -> exit != 0 -> unhealthy.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8989/health', timeout=12)"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

# ============================================================
# Rede interna do EBD.ia
# Containers se enxergam pelos nomes (postgres, redis, mcp-oracle)
# ============================================================
networks:
  ebdia_net:
    name: ebdia_net
    driver: bridge
