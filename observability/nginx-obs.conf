# EBD.ia — Observabilidade (Grafana) via HTTPS na rede interna.
# TLS termina aqui, reusando o certificado do agente; o Grafana fica em
# 127.0.0.1:3001 (sem porta publicada na rede).
server {
    listen 10.10.3.108:3000 ssl;
    server_name agente.ebd.ia.br;

    ssl_certificate     /etc/nginx/ssl/agente.ebd.ia.br.crt;
    ssl_certificate_key /etc/nginx/ssl/agente.ebd.ia.br.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    access_log /var/log/nginx/obs.access.log;
    error_log  /var/log/nginx/obs.error.log;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Grafana Live (websocket)
    location /api/live/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
    }
}
